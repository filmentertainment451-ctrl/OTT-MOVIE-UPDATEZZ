<!-- Video Editor -->

<div class="container">

    <!-- Left Tools -->
    <div class="sidebar">
        <h2>Video Tools</h2>

        <div class="tool">📂 Import Video</div>
        <div class="tool">✂ Cut</div>
        <div class="tool">🪄 Split</div>
        <div class="tool">🎬 Transition</div>
        <div class="tool">🎨 Filters</div>
        <div class="tool">✨ Effects</div>
        <div class="tool">📝 Text</div>
        <div class="tool">😊 Stickers</div>
        <div class="tool">🎵 Music</div>
        <div class="tool">🎙 Voice Over</div>
        <div class="tool">🔊 Audio</div>
        <div class="tool">⚡ Speed</div>
        <div class="tool">🎥 Animation</div>
        <div class="tool">🌈 Color</div>
        <div class="tool">📐 Crop</div>
        <div class="tool">🔄 Rotate</div>
        <div class="tool">🔍 Zoom</div>
        <div class="tool">💚 Chroma Key</div>
        <div class="tool">🧹 Remove Background</div>
        <div class="tool">🤖 AI Enhance</div>
        <div class="tool">📺 Auto Captions</div>
        <div class="tool">📤 Export</div>
    </div>

    <!-- Preview -->
    <div class="editor">

        <div style="width:900px;background:#111;padding:20px;border-radius:10px;">

            <video width="100%" height="450" controls>
                <source src="sample.mp4" type="video/mp4">
            </video>

            <br><br>

            <!-- Timeline -->
            <input type="range" min="0" max="100" value="0" style="width:100%;">

            <br><br>

            <button>▶ Play</button>
            <button>⏸ Pause</button>
            <button>✂ Split</button>
            <button>🗑 Delete</button>
            <button>⏪ Undo</button>
            <button>⏩ Redo</button>

        </div>

    </div>

</div>
