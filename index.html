<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#e50914;
    padding:15px;
    text-align:center;
}

nav{
    display:flex;
    justify-content:center;
    background:#222;
    padding:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

.hero{
    text-align:center;
    padding:50px 20px;
    background:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1200") center/cover;
}

.hero h2{
    font-size:40px;
}

.hero p{
    margin-top:10px;
}

.movies{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:30px;
}

.card{
    width:200px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.card h3{
    padding:10px;
}

.card p{
    padding:0 10px 10px;
    color:#bbb;
}

button{
    width:90%;
    margin:10px;
    padding:10px;
    border:none;
    background:#e50914;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

footer{
    text-align:center;
    background:#222;
    padding:15px;
    margin-top:20px;
}
</style>

</head>
<body>

<header>
<h1>🎬 MovieHub</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Series</a>
<a href="#">Contact</a>
</nav>

<section class="hero">
<h2>Watch Trending Movies</h2>
<p>Latest Movies & OTT Updates</p>
</section>

<section class="movies">

<div class="card">
<img src="https://picsum.photos/200/300?random=1">
<h3>Movie 1</h3>
<p>Action • 2026</p>
<button>Watch Now</button>
</div>

<div class="card">
<img src="https://picsum.photos/200/300?random=2">
<h3>Movie 2</h3>
<p>Drama • 2026</p>
<button>Watch Now</button>
</div>

<div class="card">
<img src="https://picsum.photos/200/300?random=3">
<h3>Movie 3</h3>
<p>Thriller • 2026</p>
<button>Watch Now</button>
</div>

</section>

<footer>
<p>© 2026 MovieHub | Designed with HTML & CSS</p>
</footer>

</body>
</html>
