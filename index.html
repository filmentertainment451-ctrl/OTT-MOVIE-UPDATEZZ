<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Background from Image - Free & Automatic</title>
    <style>
        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header / Navbar */
        header {
            background: var(--card-bg);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
        }

        .logo span {
            color: var(--primary-color);
        }

        /* Main Container */
        main {
            flex: 1;
            max-width: 1000px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .hero-section h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .hero-section p {
            color: #666;
            font-size: 1.1rem;
        }

        /* Dropzone Box */
        .upload-container {
            background: var(--card-bg);
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .upload-container:hover, .upload-container.dragover {
            border-color: var(--primary-color);
            background-color: rgba(0, 123, 255, 0.02);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .btn-upload {
            background-color: var(--primary-color);
            color: white;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn-upload:hover {
            background-color: var(--primary-hover);
        }

        #file-input {
            display: none;
        }

        /* Processing Loader */
        .loader-container {
            display: none;
            text-align: center;
            margin: 2rem 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Result Preview Area */
        .result-container {
            display: none;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-top: 2rem;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 600px) {
            .preview-grid {
                grid-template-columns: 1fr;
            }
        }

        .preview-box {
            text-align: center;
        }

        .preview-box h3 {
            margin-bottom: 0.5rem;
            font-size: 1rem;
            color: #555;
        }

        .img-wrapper {
            width: 100%;
            height: 300px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Checkerboard pattern for transparent background */
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%), 
                              linear-gradient(-45deg, #eee 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #eee 75%), 
                              linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .img-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .btn-download {
            background-color: #28a745;
            color: white;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-download:hover {
            background-color: #218838;
        }

        .btn-reset {
            background-color: #6c757d;
            color: white;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-reset:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">bg<span>remover</span></div>
    </header>

    <main>
        <div class="hero-section">
            <h1>Remove Image Background</h1>
            <p>100% Automatically and Free</p>
        </div>

        <div class="upload-container" id="drop-zone">
            <div class="upload-icon">📁</div>
            <h2>Upload an image to remove the background</h2>
            <p style="color: #888; margin-top: 0.5rem;">or drag and drop a file here</p>
            <button class="btn-upload" onclick="document.getElementById('file-input').click()">Upload Image</button>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div class="loader-container" id="loader">
            <div class="spinner"></div>
            <p>Removing background... Please wait.</p>
        </div>

        <div class="result-container" id="result-box">
            <div class="preview-grid">
                <div class="preview-box">
                    <h3>Original</h3>
                    <div class="img-wrapper">
                        <img id="original-img" src="" alt="Original Image">
                    </div>
                </div>
                <div class="preview-box">
                    <h3>Removed Background</h3>
                    <div class="img-wrapper">
                        <img id="result-img" src="" alt="Processed Image">
                    </div>
                </div>
            </div>
            <div class="action-buttons">
                <a id="download-btn" class="btn-download" download="bg-removed.png">Download</a>
                <button class="btn-reset" id="reset-btn">Upload New Image</button>
            </div>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('result-box');
        const originalImg = document.getElementById('original-img');
        const resultImg = document.getElementById('result-img');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');

        // Drag and drop events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file.');
                return;
            }

            // Display original image preview
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImg.src = e.target.result;
            };
            reader.readAsDataURL(file);

            // Show Loader UI
            dropZone.style.display = 'none';
            loader.style.display = 'block';

            // Send to Backend API
            removeBackgroundAPI(file);
        }

        // API Call Function
        async function removeBackgroundAPI(file) {
            const formData = new FormData();
            formData.append('image_file', file);

            try {
                /*const response = await fetch('https://api.remove.bg/v1.0/removebg', {
    method: 'POST',
    headers: {
        'X-Api-Key': 'YOUR_REMOVE_BG_API_KEY'
    },
    body: formData
});
const blob = await response.blob();
const processedUrl = URL.createObjectURL(blob);
                await new Promise(resolve => setTimeout(resolve, 2000));
                const processedUrl = originalImg.src; // Replace this with API result URL

                // Show Results UI
                resultImg.src = processedUrl;
                downloadBtn.href = processedUrl;
                
                loader.style.display = 'none';
                resultBox.style.display = 'block';

            } catch (error) {
                alert('Error removing background: ' + error.message);
                loader.style.display = 'none';
                dropZone.style.display = 'block';
            }
        }

        // Reset UI
        resetBtn.addEventListener('click', () => {
            fileInput.value = '';
            originalImg.src = '';
            resultImg.src = '';
            resultBox.style.display = 'none';
            dropZone.style.display = 'block';
        });
    </script>
</body>
</html>
