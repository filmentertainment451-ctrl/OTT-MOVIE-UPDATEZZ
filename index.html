<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free AI Background Remover</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/index.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f4f7f6;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      width: 100%;
      max-width: 800px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      color: #2c3e50;
    }

    p {
      color: #666;
      margin-bottom: 25px;
    }

    /* Drop Zone Styling */
    .drop-zone {
      border: 2px dashed #3498db;
      border-radius: 8px;
      padding: 40px 20px;
      background: #f8fafc;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
      margin-bottom: 25px;
    }

    .drop-zone:hover {
      background: #ebf5fb;
      border-color: #2980b9;
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .drop-zone p {
      margin: 0;
      font-weight: 600;
      color: #3498db;
    }

    /* Status & Loading */
    .status {
      font-weight: 600;
      color: #e67e22;
      margin-bottom: 15px;
      display: none;
    }

    /* Preview Section */
    .preview-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-bottom: 25px;
    }

    .image-card {
      flex: 1;
      min-width: 250px;
      max-width: 350px;
      background: #fafafa;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .image-card h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #555;
    }

    /* Transparent Grid for Output Preview */
    .transparent-bg {
      background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), 
                        linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #ccc 75%), 
                        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    }

    .image-card img {
      width: 100%;
      height: 220px;
      object-fit: contain;
      border-radius: 4px;
    }

    /* Buttons */
    .btn {
      background-color: #2ecc71;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background-color: #27ae60;
    }

    .btn:disabled {
      background-color: #bdc3c7;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>AI Background Remover</h1>
    <p>Upload an image to automatically remove its background locally in your browser.</p>

    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click();">
      <p>Click or Drag & Drop an Image Here</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="status" id="statusMessage">Processing image... Please wait.</div>

    <div class="preview-container" id="previewArea" style="display: none;">
      <div class="image-card">
        <h3>Original</h3>
        <img id="originalImg" src="" alt="Original Image">
      </div>
      <div class="image-card">
        <h3>Background Removed</h3>
        <img id="processedImg" class="transparent-bg" src="" alt="Result Image">
      </div>
    </div>

    <a id="downloadBtn" class="btn" style="display: none;" download="removed-background.png">Download PNG</a>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const statusMessage = document.getElementById('statusMessage');
    const previewArea = document.getElementById('previewArea');
    const originalImg = document.getElementById('originalImg');
    const processedImg = document.getElementById('processedImg');
    const downloadBtn = document.getElementById('downloadBtn');

    // Handle File Selection
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) processImage(file);
    });

    // Drag and Drop support
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.style.background = '#ebf5fb';
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.style.background = '#f8fafc';
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.background = '#f8fafc';
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        processImage(file);
      }
    });

    // Process Background Removal
    async function processImage(file) {
      // Show local image preview
      const originalUrl = URL.createObjectURL(file);
      originalImg.src = originalUrl;

      // Update UI state
      previewArea.style.display = 'none';
      downloadBtn.style.display = 'none';
      statusMessage.style.display = 'block';
      statusMessage.textContent = 'Loading AI Model & Processing Image...';

      try {
        // Remove background using @imgly/background-removal
        const blob = await imglyRemoveBackground(file, {
          progress: (key, current, total) => {
            // Optional: Track progress
            const percent = Math.round((current / total) * 100);
            if (!isNaN(percent)) {
              statusMessage.textContent = `Processing: ${percent}%`;
            }
          }
        });

        // Generate URL for the output blob
        const resultUrl = URL.createObjectURL(blob);
        
        // Update output elements
        processedImg.src = resultUrl;
        downloadBtn.href = resultUrl;

        // Display results
        statusMessage.style.display = 'none';
        previewArea.style.display = 'flex';
        downloadBtn.style.display = 'inline-block';

      } catch (error) {
        console.error(error);
        statusMessage.style.color = '#e74c3c';
        statusMessage.textContent = 'Error removing background. Please try a different image.';
      }
    }
  </script>
</body>
</html>
