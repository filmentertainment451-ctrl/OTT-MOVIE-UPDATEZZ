<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini OTT Updates</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #e5e7eb;
            padding: 15px;
        }

        .wrapper {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #1f2937;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: #ff4757;
            text-decoration: none;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #2ed573;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .status {
            font-size: 12px;
            color: #9ca3af;
            display: flex;
            align-items: center;
        }

        .hero-banner {
            background: linear-gradient(45deg, #1e1b4b, #311042);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid #3730a3;
        }

        .hero-banner h2 {
            font-size: 18px;
            margin-bottom: 5px;
            color: #fff;
        }

        .hero-banner p {
            font-size: 14px;
            color: #c7d2fe;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .update-item {
            background-color: #111827;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .update-info h3 {
            font-size: 15px;
            color: #f3f4f6;
            margin-bottom: 4px;
        }

        .tag {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .tag.netflix { background-color: rgba(229, 9, 20, 0.2); color: #e9dcdc; }
        .tag.prime { background-color: rgba(0, 168, 225, 0.2); color: #e4eef1; }
        .tag.jiohostar { background-color: rgba(0, 114, 210, 0.2); color: #e5e9ec; }
        .tag.sunnxt { background-color: rgba(219, 153, 10, 0.2); color: #e3e9ee; }
        .tag.sainaplay { background-color: rgba(188, 219, 10, 0.2); color: #e3e9ee; }
        .tag.sonyliv { background-color: rgba(10, 66, 219, 0.2); color: #e3e9ee; }
        .tag.zee5 { background-color: rgba(5, 5, 5, 0.2); color: #e3e9ee; }
        .tag.manoramamax { background-color: rgba(41, 10, 219, 0.2); color: #e3e9ee; }
        
        .time {
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <a href="#" class="logo">OTT MOVIE UPDATEZ</a>
            <div class="status"><span class="live-dot"></span> 5 New Updates Today</div>
        </header>

        <main>
            <div class="hero-banner">
                <h2>⚡ BLAST</h2>
                <p>NOW STREAMING ON NETFLIX </p>
            </div>

            <main>
            <div class="hero-banner">
                <h2>⚡ Avatar Fire And Ash</h2>
                <p>NOW STREAMING ON JIOHOSTAR </p>
            </div>

            <h2 class="section-title">UPCOMING OTT RELEASE MOVIES</h2>

            <div class="update-item">
                <div class="update-info">
                    <h3>Reacher REVOLVER RINKO</h3>
                    <span class="tag sunnxt">SUNNXT</span>
                </div>
                <span class="time">10m ago</span>
            </div>

            <div class="update-item">
                <div class="update-info">
                    <h3>Kunddala Puranam</h3>
                    <span class="tag sainaplay">SAINAPLAY</span>
                </div>
                <span class="time">2h ago</span>
            </div>

            <div class="update-item">
                <div class="update-info">
                    <h3>Mollywood Times</h3>
                    <span class="tag jiohostar">Coming soon on jiohostar</span>
                </div>
                <span class="time">5h ago</span>
            </div>
        </main>
    </div>

</body>
</html>
